name: Deploy TopSkip production

on:
    workflow_dispatch:
        inputs:
            expected_sha:
                description: Exact default-branch commit SHA approved for production
                required: true
                type: string

permissions: {}

concurrency:
    group: topskip-production
    cancel-in-progress: false

jobs:
    validate:
        name: Validate production source
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            actions: read
            contents: read
        outputs:
            image_repository: ${{ steps.image.outputs.repository }}
            algorithm_version: ${{ steps.algorithm.outputs.version }}
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
              with:
                  persist-credentials: false

            - name: Require the explicitly approved commit
              env:
                  EXPECTED_SHA: ${{ inputs.expected_sha }}
              run: |
                  if ! [[ "${EXPECTED_SHA}" =~ ^[a-f0-9]{40}$ ]]; then
                      echo 'expected_sha must be a lowercase 40-hex commit SHA.' >&2
                      exit 1
                  fi
                  if [[ "${EXPECTED_SHA}" != "${GITHUB_SHA}" ]]; then
                      echo 'expected_sha does not match the dispatched commit.' >&2
                      exit 1
                  fi

            - name: Require the official repository and default branch
              env:
                  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
              run: |
                  if [[ "${GITHUB_REPOSITORY}" != 'maximtop/topskip' ]]; then
                      echo 'Production deploys may run only in maximtop/topskip.' >&2
                      exit 1
                  fi
                  if [[ "${GITHUB_REF}" != "refs/heads/${DEFAULT_BRANCH}" ]]; then
                      echo 'Production deploys must run from the default branch.' >&2
                      exit 1
                  fi

            - name: Require successful CI for this commit
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  response=$(curl \
                      --fail \
                      --silent \
                      --show-error \
                      --header 'Accept: application/vnd.github+json' \
                      --header "Authorization: Bearer ${GH_TOKEN}" \
                      --header 'X-GitHub-Api-Version: 2022-11-28' \
                      "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&status=success&per_page=1")
                  if [[ $(jq '.total_count' <<<"${response}") -lt 1 ]]; then
                      echo 'No successful CI run exists for this commit.' >&2
                      exit 1
                  fi

            - name: Resolve the allow-listed image repository
              id: image
              run: echo 'repository=ghcr.io/maximtop/topskip-backend' >> "${GITHUB_OUTPUT}"

            - name: Resolve the source-owned algorithm version
              id: algorithm
              run: |
                  algorithm_version=$(sed -nE "s/^export const SERVER_ANALYSIS_ALGORITHM_VERSION = '(server-v[1-9][0-9]*)';$/\1/p" common/src/server-analysis-contract.ts)
                  if ! [[ "${algorithm_version}" =~ ^server-v[1-9][0-9]*$ ]]; then
                      echo 'Could not extract one allow-listed algorithm version.' >&2
                      exit 1
                  fi
                  echo "version=${algorithm_version}" >> "${GITHUB_OUTPUT}"

    build:
        name: Build immutable backend image
        needs: validate
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            packages: write
        outputs:
            digest: ${{ steps.build.outputs.digest }}
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
              with:
                  persist-credentials: false

            - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ github.token }}

            - name: Build and publish
              id: build
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64
                  push: true
                  provenance: true
                  sbom: true
                  tags: ${{ needs.validate.outputs.image_repository }}:${{ github.sha }}
                  labels: |
                      org.opencontainers.image.source=https://github.com/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        name: Deploy immutable digest
        needs: [validate, build]
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions: {}
        environment:
            name: production
            url: https://topskip.maximtop.dev/v1/health
        steps:
            - name: Configure restricted SSH access
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
                  DEPLOY_PRIVATE_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}
                  DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
              run: |
                  if ! [[ "${DEPLOY_HOST}" =~ ^[A-Za-z0-9.-]+$ ]]; then
                      echo 'DEPLOY_HOST is invalid or missing.' >&2
                      exit 1
                  fi
                  if [[ -z "${DEPLOY_PORT}" ]]; then
                      DEPLOY_PORT=22
                  elif ! [[ "${DEPLOY_PORT}" =~ ^[0-9]{1,5}$ ]] ||
                      ((DEPLOY_PORT < 1 || DEPLOY_PORT > 65535)); then
                      echo 'DEPLOY_PORT must be a TCP port.' >&2
                      exit 1
                  fi
                  test -n "${DEPLOY_PRIVATE_KEY}"
                  test -n "${DEPLOY_KNOWN_HOSTS}"
                  install -d -m 0700 "${HOME}/.ssh"
                  printf '%s\n' "${DEPLOY_PRIVATE_KEY}" > "${HOME}/.ssh/topskip-deploy"
                  printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
                  chmod 0600 "${HOME}/.ssh/topskip-deploy" "${HOME}/.ssh/known_hosts"
                  ssh-keygen -y -f "${HOME}/.ssh/topskip-deploy" >/dev/null
                  known_host=${DEPLOY_HOST}
                  if [[ ${DEPLOY_PORT} != 22 ]]; then
                      known_host="[${DEPLOY_HOST}]:${DEPLOY_PORT}"
                  fi
                  ssh-keygen -F "${known_host}" -f "${HOME}/.ssh/known_hosts" >/dev/null

            - name: Deploy and verify
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
                  IMAGE_REFERENCE: ${{ needs.validate.outputs.image_repository }}@${{ needs.build.outputs.digest }}
                  PUBLIC_HEALTH_URL: https://topskip.maximtop.dev/v1/health
                  PUBLIC_CONFIG_URL: https://topskip.maximtop.dev/v1/config
                  EXPECTED_ALGORITHM_VERSION: ${{ needs.validate.outputs.algorithm_version }}
              run: |
                  if [[ -z "${DEPLOY_PORT}" ]]; then
                      DEPLOY_PORT=22
                  fi
                  if ! [[ "${IMAGE_REFERENCE}" =~ ^ghcr\.io/maximtop/topskip-backend@sha256:[a-f0-9]{64}$ ]]; then
                      echo 'The build did not produce an allow-listed immutable image digest.' >&2
                      exit 1
                  fi
                  remote() {
                      timeout 360 ssh \
                          -T \
                          -p "${DEPLOY_PORT}" \
                          -i "${HOME}/.ssh/topskip-deploy" \
                          -o BatchMode=yes \
                          -o ConnectTimeout=15 \
                          -o IdentitiesOnly=yes \
                          -o ServerAliveCountMax=3 \
                          -o ServerAliveInterval=15 \
                          -o StrictHostKeyChecking=yes \
                          -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
                          "topskip-deploy@${DEPLOY_HOST}" \
                          "$@"
                  }
                  public_api() {
                      local deadline=$((SECONDS + 90))
                      local config
                      local response
                      while ((SECONDS < deadline)); do
                          response=$(curl \
                              --fail \
                              --silent \
                              --show-error \
                              --connect-timeout 5 \
                              --max-time 10 \
                              "${PUBLIC_HEALTH_URL}" 2>/dev/null || true)
                          if [[ $(tr -d '[:space:]' <<<"${response}") == '{"ok":true}' ]]; then
                              config=$(curl \
                                  --fail \
                                  --silent \
                                  --show-error \
                                  --connect-timeout 5 \
                                  --max-time 10 \
                                  "${PUBLIC_CONFIG_URL}" 2>/dev/null || true)
                              if jq --exit-status --arg version "${EXPECTED_ALGORITHM_VERSION}" \
                                  '.apiVersion == 1 and .algorithmVersion == $version' \
                                  <<<"${config}" >/dev/null 2>&1; then
                                  return 0
                              fi
                          fi
                          sleep 3
                      done
                      return 1
                  }

                  if ! remote deploy "${IMAGE_REFERENCE}"; then
                      echo 'Remote deployment failed; its loopback check already attempted restoration.' >&2
                      exit 1
                  fi
                  if public_api; then
                      remote status
                      exit 0
                  fi

                  echo 'Public health check failed; requesting rollback.' >&2
                  remote rollback || echo 'Automatic rollback failed and needs operator attention.' >&2
                  public_api || true
                  exit 1

            - name: Remove SSH credentials
              if: always()
              run: rm -f "${HOME}/.ssh/topskip-deploy" "${HOME}/.ssh/known_hosts"
