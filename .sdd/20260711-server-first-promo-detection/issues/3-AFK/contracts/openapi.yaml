openapi: 3.1.0
info:
  title: TopSkip Local Backend API
  version: 0.3.0
  summary: Local backend ready-response metadata required by the extension result cache.
servers:
  - url: http://127.0.0.1:8787
    description: Local development backend
paths:
  /v1/analysis:
    post:
      operationId: requestAnalysis
      summary: Request server-mode promo analysis for a YouTube video.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: The backend has a ready result with cache metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "202":
          description: The backend accepted or joined a non-blocking analysis job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingResponse"
        "400":
          description: The request is invalid and did not start work.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: The request body exceeds the local API limit and did not start work.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    AnalysisRequest:
      type: object
      additionalProperties: false
      required:
        - videoId
        - extensionVersion
        - algorithmVersion
        - client
      properties:
        videoId:
          type: string
          pattern: "^[A-Za-z0-9_-]{11}$"
        durationSec:
          type: number
          exclusiveMinimum: 0
        extensionVersion:
          type: string
          minLength: 1
        algorithmVersion:
          type: string
          minLength: 1
        client:
          type: object
          additionalProperties: false
          required:
            - source
            - capabilities
          properties:
            source:
              type: string
              const: chrome-extension
            capabilities:
              type: array
              items:
                type: string
              uniqueItems: true
    ReadyResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - videoId
        - algorithmVersion
        - source
        - sourceResultId
        - freshness
        - promoBlocks
      properties:
        status:
          type: string
          const: ready
        videoId:
          type: string
          pattern: "^[A-Za-z0-9_-]{11}$"
        algorithmVersion:
          type: string
          minLength: 1
        source:
          type: string
          const: server_cache
        sourceResultId:
          type: string
          minLength: 1
          description: Stable backend result identifier mirrored by the extension cache.
        freshness:
          $ref: "#/components/schemas/ResultFreshness"
        promoBlocks:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PromoBlock"
    ResultFreshness:
      type: object
      additionalProperties: false
      required:
        - expiresAtMs
      properties:
        expiresAtMs:
          type: integer
          minimum: 1
          description: Unix epoch milliseconds after which the extension must miss local cache.
    PromoBlock:
      type: object
      additionalProperties: false
      required:
        - startSec
      properties:
        startSec:
          type: number
          minimum: 0
        endSec:
          type: number
          exclusiveMinimum: 0
          description: Valibot enforces endSec greater than startSec.
        confidence:
          type: string
          enum:
            - low
            - medium
            - high
    ProcessingResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - videoId
        - algorithmVersion
        - jobId
        - pollAfterSec
      properties:
        status:
          type: string
          const: processing
        videoId:
          type: string
          pattern: "^[A-Za-z0-9_-]{11}$"
        algorithmVersion:
          type: string
          minLength: 1
        jobId:
          type: string
          minLength: 1
        pollAfterSec:
          type: integer
          minimum: 1
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - error
      properties:
        status:
          type: string
          const: invalid_request
        error:
          type: object
          additionalProperties: false
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - invalid_video_id
                - invalid_request
                - request_body_too_large
            message:
              type: string
              minLength: 1
