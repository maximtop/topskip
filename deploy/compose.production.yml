name: topskip

services:
    backend:
        image: ${TOPSKIP_IMAGE:?TOPSKIP_IMAGE must be an immutable GHCR digest}
        container_name: topskip-backend
        restart: unless-stopped
        init: true
        user: '1000:1000'
        env_file:
            - ${TOPSKIP_ENV_FILE:-./production.env}
        environment:
            NODE_ENV: production
            TOPSKIP_HOST: 0.0.0.0
            TOPSKIP_PORT: '8787'
            TOPSKIP_DATABASE_PATH: /var/lib/topskip/topskip.sqlite
            TOPSKIP_CAPTION_SOURCE: extension_upload
            # Retained only so the previous image remains a valid one-command rollback.
            TOPSKIP_YT_DLP_PATH: /opt/topskip/bin/yt-dlp
        ports:
            - '127.0.0.1:18787:8787'
        volumes:
            - topskip-data:/var/lib/topskip
        read_only: true
        tmpfs:
            - /tmp:rw,exec,nosuid,nodev,size=256m,uid=1000,gid=1000,mode=0700
        cap_drop:
            - ALL
        security_opt:
            - no-new-privileges:true
        pids_limit: 128
        mem_limit: 1g
        cpus: 1.0
        stop_grace_period: 30s
        healthcheck:
            test:
                - CMD
                - node
                - -e
                - >-
                    fetch('http://127.0.0.1:8787/v1/health').then(async
                    (response) => { const body = await response.json(); if
                    (!response.ok || body.ok !== true) process.exit(1);
                    }).catch(() => process.exit(1))
            interval: 10s
            timeout: 5s
            start_period: 20s
            retries: 5
        logging:
            driver: json-file
            options:
                max-size: 10m
                max-file: '3'

volumes:
    topskip-data:
        name: topskip-data
